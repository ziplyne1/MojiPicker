name: Tests

on:
  push:
    branches:
    - 'main'
  pull_request:

# fixme)) macos version and xcode version shouldn't be hardcoded
jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 26.4
      - name: Run tests
        run: swift test
